name: Full DevOps CI/CD Pipeline

on:
  push:
    branches: [ "master", "main" ]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install flake8
        run: pip install flake8
      - name: Run flake8
        # We only throw errors for critical syntax issues right now so it doesn't block learning
        run: flake8 TodoManager/ --count --select=E9,F63,F7,F82 --show-source --statistics

  test:
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          pip install -r TodoManager/requirements.txt
          playwright install chromium
      - name: Run Backend Unit Tests
        run: python TodoManager/test_app.py
      - name: Run Frontend Playwright Tests
        env:
          CI: "true"
        run: |
          # Start Flask in the background
          python TodoManager/app.py &
          # Give it a few seconds to start up
          sleep 3
          # Run the automated browser test
          python TodoManager/frontend_test.py

  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          # GITHUB_TOKEN is automatically provided by Actions!
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Dockerize and Push to GHCR
        uses: docker/build-push-action@v4
        with:
          context: ./TodoManager
          push: true
          # Make sure the container name is lowercase
          tags: ghcr.io/${{ github.repository_owner }}/todomanager:latest

  deploy-to-aws-ec2:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: SSH into EC2 and Deploy Container
        uses: appleboy/ssh-action@v0.1.10
        with:
          # These are secrets you will add to your GitHub Repository Settings!
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # 1. Log into GHCR on the EC2 instance
            echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            
            # 2. Pull the newly built image
            docker pull ghcr.io/${{ github.repository_owner }}/todomanager:latest
            
            # 3. Stop and remove the old container if it exists
            docker stop todomanager_prod || true
            docker rm todomanager_prod || true
            
            # 4. Run the new container, mapping EC2's port 80 to the container's port 5000
            docker run -d --name todomanager_prod -p 80:5000 ghcr.io/${{ github.repository_owner }}/todomanager:latest
